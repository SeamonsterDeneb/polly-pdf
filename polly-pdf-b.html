<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Polly Alt for PDF (Phase 1.1)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <style>
        :root { --polly-blue: #2271b1; --polly-bg: #f0f2f5; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--polly-bg); padding: 40px; color: #333; }
        .container { max-width: 900px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { color: var(--polly-blue); margin-top: 0; }
        .config-box { background: #f9f9f9; padding: 20px; border: 1px solid #ddd; border-radius: 8px; margin-bottom: 20px; }
        input[type="text"] { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        
        #drop-zone { border: 2px dashed var(--polly-blue); padding: 40px; text-align: center; cursor: pointer; transition: 0.3s; margin-bottom: 20px; border-radius: 8px; background: #fff; }
        #drop-zone.dragover { background: #e7f3ff; border-style: solid; }
        
        #results { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; margin-top: 30px; }
        .image-card { border: 1px solid #ddd; border-radius: 8px; overflow: hidden; background: #fff; display: flex; flex-direction: column; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .image-card img { width: 100%; height: 180px; object-fit: contain; background: #f0f0f0; border-bottom: 1px solid #eee; }
        .card-content { padding: 12px; text-align: center; }
        .gen-btn { background: var(--polly-blue); color: white; border: none; padding: 8px 12px; border-radius: 4px; cursor: pointer; font-weight: 600; width: 100%; }
        #status { font-style: italic; color: #666; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h1>🦜 Polly Alt: PDF Edition</h1>
    
    <div class="config-box">
        <label><strong>Gemini API Key:</strong></label>
        <input type="text" id="api-key" placeholder="Paste your API key here...">
    </div>

    <div id="drop-zone">
        <p><strong>Drag & Drop PDF here</strong> or click to browse</p>
        <input type="file" id="file-input" accept="application/pdf" style="display: none;">
    </div>

    <div id="status"></div>
    <div id="results"></div>
</div>

<script>
    const pdfjs = window['pdfjs-dist/build/pdf'];
    pdfjs.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

    const dropZone = document.getElementById('drop-zone');
    const fileInput = document.getElementById('file-input');
    const results = document.getElementById('results');
    const status = document.getElementById('status');

    ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(n => {
        dropZone.addEventListener(n, (e) => { e.preventDefault(); e.stopPropagation(); }, false);
    });

    dropZone.onclick = () => fileInput.click();
    fileInput.onchange = (e) => handleFile(e.target.files[0]);
    dropZone.addEventListener('drop', (e) => {
        const file = e.dataTransfer.files[0];
        if (file) handleFile(file);
    });

    async function handleFile(file) {
        if (!file || file.type !== 'application/pdf') return;
        results.innerHTML = '';
        status.textContent = '🦜 Preparing page previews...';
        
        try {
            const arrayBuffer = await file.arrayBuffer();
            const pdf = await pdfjs.getDocument({ data: arrayBuffer }).promise;

            for (let i = 1; i <= pdf.numPages; i++) {
                status.textContent = `🦜 Rendering Page ${i} of ${pdf.numPages}...`;
                const page = await pdf.getPage(i);
                
                // Render page at a high enough resolution for Gemini to "read" it
                const viewport = page.getViewport({ scale: 2.0 });
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                canvas.width = viewport.width;
                canvas.height = viewport.height;

                await page.render({ canvasContext: ctx, viewport: viewport }).promise;

                const card = document.createElement('div');
                card.className = 'image-card';
                card.style.width = '100%'; 
                card.innerHTML = `
                    <img src="${canvas.toDataURL('image/jpeg', 0.8)}" style="height: auto; max-height: 500px;">
                    <div class="card-content">
                        <h3>Page ${i}</h3>
                        <button class="gen-btn" onclick="triggerGeminiPage(this, ${i})">Describe Images on this Page</button>
                    </div>
                `;
                results.appendChild(card);
            }
            status.textContent = `Ready! Choose a page for Polly to analyze.`;
        } catch (err) {
            console.error(err);
            status.textContent = "Error: Captain, the pages wouldn't turn.";
        }
    }

    async function triggerGeminiPage(btn, pageNum) {
        const apiKey = document.getElementById('api-key').value;
        if (!apiKey) {
            alert("🦜 Please enter your Gemini API Key first!");
            return;
        }

        const card = btn.closest('.image-card');
        const imgEl = card.querySelector('img');
        const originalLabel = btn.textContent;
        
        btn.textContent = '🦜 Checking permissions...';
        btn.disabled = true;

        try {
            // 1. AUTODISCOVERY: Fetch allowed models for this API key
            const listUrl = `https://generativelanguage.googleapis.com/v1beta/models?key=${apiKey}`;
            const listResp = await fetch(listUrl);
            const listData = await listResp.json();

            if (listData.error) throw new Error(`API Key Error: ${listData.error.message}`);

            // Define our "wishlist" in order of preference
            const wishlist = ['gemini-3-flash-preview', 'gemini-3-flash', 'gemini-2.5-flash', 'gemini-1.5-flash'];
            let selectedModel = '';

            // Find the first model in our wishlist that the user actually has access to
            for (const preferred of wishlist) {
                if (listData.models.some(m => m.name.includes(preferred) && m.supportedGenerationMethods.includes('generateContent'))) {
                    selectedModel = preferred;
                    break;
                }
            }

            // Final fallback: Use the first available Flash model if none of our favorites are found
            if (!selectedModel) {
                const anyFlash = listData.models.find(m => m.name.includes('flash'));
                if (anyFlash) {
                    selectedModel = anyFlash.name.split('/').pop();
                } else {
                    throw new Error("No compatible Gemini Flash models found on this account.");
                }
            }

            console.log(`🦜 Polly chose: ${selectedModel}`);
            btn.textContent = '🦜 Polly is squinting...';

            // 2. THE ACTUAL GENERATION
            const base64Data = imgEl.src.split(',')[1];
            const apiUrl = `https://generativelanguage.googleapis.com/v1beta/models/${selectedModel}:generateContent?key=${apiKey}`;

            const prompt = `Identify every significant image, chart, or photo on this PDF page. 
                For each one, provide 2 distinct alt-text variations (~125 chars each) and a brief explanation.
                Return the data ONLY as a valid JSON array of objects. 
                Each object must have:
                "image_description": (a brief label),
                "options": [ {"alt": "...", "explanation": "..."}, {"alt": "...", "explanation": "..."} ]`;

            const response = await fetch(apiUrl, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{
                        parts: [
                            { text: prompt },
                            { inline_data: { mime_type: "image/jpeg", data: base64Data } }
                        ]
                    }],
                    generationConfig: { responseMimeType: "application/json" }
                })
            });

            const data = await response.json();
            if (data.error) throw new Error(data.error.message);

            const rawText = data.candidates[0].content.parts[0].text;
            showPdfChoiceModal(JSON.parse(rawText), imgEl.src);

        } catch (err) {
            console.error(err);
            alert('🦜 Polly AI Error: ' + err.message);
        } finally {
            btn.textContent = originalLabel;
            btn.disabled = false;
        }
    }

    function showPdfChoiceModal(resultsArr, imgSrc) {
        document.getElementById('polly-modal-overlay')?.remove();

        const overlay = document.createElement('div');
        overlay.id = 'polly-modal-overlay';
        overlay.className = 'gemini-alt-modal-overlay';

        const modal = document.createElement('div');
        modal.className = 'gemini-modal-alert';
        // Expanding the modal for a professional "Review Station" feel
        modal.style.maxWidth = '1100px'; 
        modal.style.width = '95%';
        modal.style.maxHeight = '90vh';
        modal.style.display = 'flex';
        modal.style.flexDirection = 'column';
        modal.style.padding = '0'; 
        modal.style.overflow = 'hidden';

        modal.innerHTML = `
            <div style="background: #2271b1; color: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center;">
                <h2 style="margin: 0; font-size: 1.2em;">🦜 Polly's Review Station</h2>
                <button onclick="document.getElementById('polly-modal-overlay').remove()" style="background: rgba(255,255,255,0.2); border: none; color: white; cursor: pointer; padding: 5px 10px; border-radius: 4px;">Close ✕</button>
            </div>
            <div style="display: flex; flex: 1; overflow: hidden;">
                <div style="flex: 1; background: #525659; padding: 20px; overflow-y: auto; display: flex; justify-content: center;">
                    <div style="position: relative; box-shadow: 0 0 20px rgba(0,0,0,0.5); background: white;">
                        <img src="${imgSrc}" style="max-width: 100%; display: block;">
                    </div>
                </div>
                
                <div style="flex: 1; background: white; padding: 25px; overflow-y: auto; border-left: 1px solid #ddd;">
                    <p style="margin-top: 0; color: #666; font-style: italic;">Polly identified the following images on this page:</p>
                    
                    ${resultsArr.map((item, idx) => `
                        <div style="margin-bottom: 40px; border: 1px solid #e5e5e5; border-radius: 8px; overflow: hidden;">
                            <div style="background: #f8f9fa; padding: 10px 15px; border-bottom: 1px solid #e5e5e5; font-weight: bold; color: #2271b1;">
                                Image ${idx + 1}: ${item.image_description}
                            </div>
                            <div style="padding: 15px;">
                                ${item.options.map(opt => `
                                    <div style="margin-bottom: 20px; background: #fff; border: 1px solid #eee; border-radius: 6px; padding: 12px; transition: 0.2s;" class="choice-card">
                                        <div style="font-size: 11px; font-weight: bold; color: #999; margin-bottom: 8px;">ALT TEXT SUGGESTION</div>
                                        <div style="font-size: 14px; line-height: 1.5; color: #333; margin-bottom: 12px;">${opt.alt}</div>
                                        <div style="font-size: 12px; color: #666; background: #f1f6fb; padding: 8px; border-radius: 4px; border-left: 3px solid #2271b1;">
                                            <strong>Strategy:</strong> ${opt.explanation}
                                        </div>
                                        <button class="gen-btn" style="width: 100%; margin-top: 12px; height: 36px; font-size: 13px;" 
                                            onclick="navigator.clipboard.writeText('${opt.alt.replace(/'/g, "\\'")}'); this.textContent='✓ Copied to Clipboard!'; setTimeout(() => this.textContent='Copy Alt Text', 2000);">
                                            Copy Alt Text
                                        </button>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    `).join('')}
                </div>
            </div>
        `;

        overlay.appendChild(modal);
        document.body.appendChild(overlay);
    }

</script>
</body>
</html>
