<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Polly PDF | Phase 2: The Writer</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <style>
        :root {
            --polly-blue: #0073aa;
            --polly-dark: #1d2327;
            --bg: #f6f7f7;
            --border: #dcdcde;
            --error: #d63638;
            --success: #46b450;
            --warning: #f0b849;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen-Sans, Ubuntu, Cantarell, "Helvetica Neue", sans-serif;
            display: flex;
            height: 100vh;
            margin: 0;
            background: var(--bg);
            color: var(--polly-dark);
            overflow: hidden;
        }

        #gallery {
            width: 420px;
            background: white;
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            box-shadow: 2px 0 5px rgba(0,0,0,0.05);
            z-index: 10;
        }

        .gallery-header {
            padding: 20px;
            border-bottom: 1px solid var(--border);
            background: var(--polly-blue);
            color: white;
        }

        .gallery-header h2 { margin: 0; font-size: 1.2rem; }
        
        .api-config {
            padding: 15px 20px;
            background: #f0f0f1;
            border-bottom: 1px solid var(--border);
            font-size: 0.75rem;
        }

        .api-config input {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            border: 1px solid var(--border);
            border-radius: 3px;
            box-sizing: border-box;
        }

        .api-actions {
            display: flex;
            justify-content: space-between;
            margin-top: 8px;
        }

        .api-actions button {
            background: none;
            border: none;
            text-decoration: underline;
            font-size: 0.7rem;
            cursor: pointer;
            padding: 0;
        }

        #model-log {
            font-family: monospace;
            font-size: 0.65rem;
            background: #000;
            color: #0f0;
            padding: 10px;
            margin-top: 10px;
            border-radius: 4px;
            max-height: 150px;
            overflow-y: auto;
        }

        #image-list {
            flex-grow: 1;
            overflow-y: auto;
            padding: 15px;
        }

        .image-card {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            margin-bottom: 20px;
            overflow: hidden;
            animation: fadeIn 0.3s ease-out;
            position: relative;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .image-card img {
            width: 100%;
            height: 200px;
            object-fit: contain;
            background: #e5e5e5;
            display: block;
        }

        .image-info {
            padding: 12px;
            font-size: 0.8rem;
            border-top: 1px solid var(--border);
            background: white;
        }

        .badge {
            display: inline-block;
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 0.65rem;
            margin-bottom: 8px;
        }
        .badge-untagged { background: #fcf0f1; color: var(--error); border: 1px solid #f1c3c4; }
        .badge-queued { background: #fff8e5; color: #856404; border: 1px solid #ffeeba; }
        .badge-remediated { background: #ecf7ed; color: var(--success); border: 1px solid #c1e8c5; }
        
        .badge-type-legacy { background: #fff3cd; color: #856404; border: 1px solid #ffeeba; font-size: 0.8rem; padding: 5px 12px; }
        .badge-type-tagged { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; font-size: 0.8rem; padding: 5px 12px; }

        #workspace {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        #drop-zone {
            width: 80%;
            max-width: 600px;
            height: 350px;
            border: 3px dashed var(--polly-blue);
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--polly-blue);
            transition: all 0.3s;
            text-align: center;
            padding: 20px;
            background: white;
        }

        #drop-zone.has-file {
            border-style: solid;
            background: white;
            height: auto;
            padding: 40px;
        }

        .spinner {
            width: 24px;
            height: 24px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid var(--polly-blue);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .hidden { display: none !important; }

        #status-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 10px 20px;
            background: white;
            border-top: 1px solid var(--border);
            font-size: 0.85rem;
            display: flex;
            justify-content: space-between;
        }

        button.primary {
            background: var(--polly-blue);
            color: white; border: none;
            padding: 10px; border-radius: 4px;
            cursor: pointer; font-weight: bold;
            width: 100%; margin-top: 10px;
        }
        button.primary:hover { background: #005a87; }
        button.primary:disabled { background: #ccc; cursor: not-allowed; }

        button.download-btn {
            background: var(--success);
            padding: 15px 30px;
            font-size: 1rem;
            margin-top: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        button.download-btn:hover { background: #3da348; }

        .char-counter {
            text-align: right; font-size: 0.7rem; color: #999; margin-top: 4px;
        }
        .over-limit { color: var(--error); font-weight: bold; }

        #compliance-info {
            margin-bottom: 20px;
            text-align: center;
        }
    </style>
</head>
<body>

    <div id="gallery">
        <div class="gallery-header">
            <h2>Polly Gallery</h2>
            <p id="image-count">No PDF loaded</p>
        </div>
        <div class="api-config">
            <label><strong>Gemini API Key</strong></label>
            <input type="password" id="api-key" placeholder="Paste your API key here...">
            <div class="api-actions">
                <button onclick="discoverModels(true)" style="color: var(--polly-blue);">🔍 Discover Models</button>
                <button onclick="clearKey()" style="color: var(--error);">Clear stored key</button>
            </div>
            <div id="model-log" class="hidden">Initializing discovery...</div>
        </div>
        <div id="image-list">
            <div id="placeholder-msg" style="text-align: center; color: #888; margin-top: 50px; padding: 20px;">
                <p>Drop a PDF document into the workspace to scan for assets.</p>
            </div>
        </div>
    </div>

    <div id="workspace">
        <div id="drop-zone">
            <div id="idle-view">
                <svg width="64" height="64" viewBox="0 0 24 24" fill="currentColor" style="margin-bottom: 20px; opacity: 0.3;">
                    <path d="M14,2H6A2,2 0 0,0 4,4V20A2,2 0 0,0 6,22H18A2,2 0 0,0 20,20V8L14,2M18,20H6V4H13V9H18V20Z"/>
                </svg>
                <h3>System Ready</h3>
                <p>Drag and drop a PDF file here.</p>
            </div>
            
            <div id="loading-view" class="hidden">
                <div class="spinner" style="margin: 0 auto 20px; width: 40px; height: 40px;"></div>
                <h3 id="loading-title">Analyzing PDF...</h3>
                <p id="loading-sub">Processing page streams...</p>
            </div>

            <div id="ready-view" class="hidden">
                <div id="compliance-info">
                    <span id="doc-type-badge" class="badge">Checking Structure...</span>
                </div>
                <h3 id="ready-title">PDF Processed</h3>
                <p id="ready-sub">0 images remediated.</p>
                <button class="primary download-btn" id="download-btn" disabled onclick="handleDownload()">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="white"><path d="M5,20H19V18H5M19,9H15V3H9V9H5L12,16L19,9Z"/></svg>
                    Download Remediated PDF
                </button>
            </div>
        </div>

        <div id="status-bar">
            <span id="status-left">Polly PDF v0.2 Alpha</span>
            <span id="status-right">Idle</span>
        </div>
    </div>

    <script>
        const { PDFDocument, PDFName, PDFDict, PDFArray, PDFString, PDFNumber, PDFRawStream } = PDFLib;
        const pdfjsLib = window['pdfjs-dist/build/pdf'];
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        const dropZone = document.getElementById('drop-zone');
        const idleView = document.getElementById('idle-view');
        const loadingView = document.getElementById('loading-view');
        const loadingTitle = document.getElementById('loading-title');
        const loadingSub = document.getElementById('loading-sub');
        const readyView = document.getElementById('ready-view');
        const readySub = document.getElementById('ready-sub');
        const downloadBtn = document.getElementById('download-btn');
        const docTypeBadge = document.getElementById('doc-type-badge');
        const imageList = document.getElementById('image-list');
        const imageCountLabel = document.getElementById('image-count');
        const statusRight = document.getElementById('status-right');
        const apiKeyInput = document.getElementById('api-key');
        const modelLog = document.getElementById('model-log');

        let authorizedModels = [];
        let remediationQueue = [];
        let isProcessingQueue = false;
        let remediatedCount = 0;
        let currentPdfBytes = null;
        let currentFileName = "";
        
        // This stores: { alt, pageIdx, imgName }
        let remediationResults = {}; 

        apiKeyInput.value = localStorage.getItem('polly_api_key') || '';
        if (apiKeyInput.value) discoverModels(false);

        apiKeyInput.onchange = () => {
            if (apiKeyInput.value.trim()) {
                localStorage.setItem('polly_api_key', apiKeyInput.value.trim());
                discoverModels(false);
            }
        };

        function clearKey() {
            localStorage.removeItem('polly_api_key');
            apiKeyInput.value = '';
            modelLog.classList.add('hidden');
            alert("API Key cleared.");
        }

        async function discoverModels(showUI = false) {
            const apiKey = apiKeyInput.value.trim();
            if (!apiKey) return;
            if (showUI) modelLog.classList.remove('hidden');
            modelLog.innerText = "Scanning available models...\n";
            try {
                const url = `https://generativelanguage.googleapis.com/v1/models?key=${apiKey}`;
                const response = await fetch(url);
                const data = await response.json();
                if (response.ok) {
                    authorizedModels = data.models.filter(m => m.supportedGenerationMethods.includes('generateContent'));
                    modelLog.innerText = `Found ${authorizedModels.length} models.\n`;
                    statusRight.innerText = "System Ready";
                }
            } catch (err) {
                console.warn("Discovery failed", err);
            }
        }

        dropZone.ondragover = (e) => { e.preventDefault(); dropZone.classList.add('hover'); };
        dropZone.ondragleave = () => dropZone.classList.remove('hover');
        dropZone.ondrop = async (e) => {
            e.preventDefault();
            dropZone.classList.remove('hover');
            const file = e.dataTransfer.files[0];
            if (file?.type === "application/pdf") {
                currentFileName = file.name.replace(".pdf", "-remediated.pdf");
                processPDF(file);
            }
        };

        async function processPDF(file) {
            idleView.classList.add('hidden');
            readyView.classList.add('hidden');
            loadingView.classList.remove('hidden');
            imageList.innerHTML = "";
            remediatedCount = 0;
            remediationResults = {};

            try {
                const arrayBuffer = await file.arrayBuffer();
                currentPdfBytes = arrayBuffer; 
                
                const pdfDocCheck = await PDFDocument.load(arrayBuffer.slice(0));
                const catalog = pdfDocCheck.catalog;
                const isTagged = !!catalog.get(PDFName.of('StructTreeRoot'));

                if (isTagged) {
                    docTypeBadge.innerText = "Tagged PDF Structure Detected";
                    docTypeBadge.className = "badge badge-type-tagged";
                } else {
                    docTypeBadge.innerText = "Legacy/Untagged Document Detected";
                    docTypeBadge.className = "badge badge-type-legacy";
                }
                
                const pdf = await pdfjsLib.getDocument({ data: arrayBuffer.slice(0) }).promise;
                let foundCount = 0;

                for (let i = 1; i <= pdf.numPages; i++) {
                    loadingSub.innerText = `Scanning Page ${i} of ${pdf.numPages}...`;
                    const page = await pdf.getPage(i);
                    const operatorList = await page.getOperatorList();
                    
                    for (let j = 0; j < operatorList.fnArray.length; j++) {
                        if (operatorList.fnArray[j] === pdfjsLib.OPS.paintImageXObject || 
                            operatorList.fnArray[j] === pdfjsLib.OPS.paintJpegXObject) {
                            
                            const imgName = operatorList.argsArray[j][0];
                            const imgObj = await new Promise(r => page.objs.get(imgName, r));
                            
                            if (imgObj) {
                                foundCount++;
                                // We store metadata: PageIndex (0-based) and Internal PDF Name
                                renderImageToGallery(imgObj, i, foundCount, i - 1, imgName);
                            }
                        }
                    }
                }
                
                loadingView.classList.add('hidden');
                readyView.classList.remove('hidden');
                dropZone.classList.add('has-file');
                imageCountLabel.innerText = `${foundCount} Assets Identified`;
                updateDownloadButton();
            } catch (err) {
                console.error(err);
                loadingTitle.innerText = "System Error";
                loadingView.classList.remove('hidden');
            }
        }

        function renderImageToGallery(imgObj, pageNum, index, pageIdx, imgName) {
            const canvas = document.createElement('canvas');
            canvas.width = imgObj.width; canvas.height = imgObj.height;
            const ctx = canvas.getContext('2d');
            try {
                if (imgObj.bitmap) ctx.drawImage(imgObj.bitmap, 0, 0);
                else {
                    const totalPixels = imgObj.width * imgObj.height;
                    const rgbaData = imgObj.data.length === totalPixels * 3 ? new Uint8ClampedArray(totalPixels * 4) : imgObj.data;
                    if (imgObj.data.length === totalPixels * 3) {
                        for (let i = 0, j = 0; i < imgObj.data.length; i += 3, j += 4) {
                            rgbaData[j] = imgObj.data[i]; rgbaData[j+1] = imgObj.data[i+1];
                            rgbaData[j+2] = imgObj.data[i+2]; rgbaData[j+3] = 255;
                        }
                    }
                    ctx.putImageData(new ImageData(rgbaData, imgObj.width, imgObj.height), 0, 0);
                }
                const dataUrl = canvas.toDataURL('image/jpeg', 0.8);
                const card = document.createElement('div');
                card.className = 'image-card';
                card.id = `img-card-${index}`;
                card.innerHTML = `
                    <img src="${dataUrl}">
                    <div class="image-info">
                        <span class="badge badge-untagged" id="badge-${index}">Untagged</span>
                        <div><strong>Asset #${index}</strong> (Page ${pageNum})</div>
                        <div id="content-${index}">
                            <button class="primary" id="btn-${index}" onclick="addToQueue(${index}, '${dataUrl.split(',')[1]}', ${pageIdx}, '${imgName}')">Analyze Logic</button>
                        </div>
                    </div>
                `;
                imageList.appendChild(card);
            } catch (e) { console.error(e); }
        }

        function addToQueue(index, base64, pageIdx, imgName) {
            const apiKey = apiKeyInput.value.trim();
            if (!apiKey) { alert("API Key required."); return; }
            const badge = document.getElementById(`badge-${index}`);
            const btn = document.getElementById(`btn-${index}`);
            const container = document.getElementById(`content-${index}`);
            badge.className = "badge badge-queued";
            badge.innerText = "Queued";
            if (btn) { btn.disabled = true; btn.innerText = "Queued..."; }
            remediationQueue.push({ index, base64, container, badge, pageIdx, imgName });
            processQueue();
        }

        async function processQueue() {
            if (isProcessingQueue || remediationQueue.length === 0) return;
            isProcessingQueue = true;
            const task = remediationQueue.shift();
            
            task.container.innerHTML = `<div style="display:flex; align-items:center; gap:10px; margin-top:10px;"><div class="spinner"></div><span id="polly-feedback-${task.index}">Pacing request...</span></div>`;
            await new Promise(r => setTimeout(r, 2500));

            task.container.innerHTML = `<div style="display:flex; align-items:center; gap:10px; margin-top:10px;"><div class="spinner"></div><span id="polly-feedback-${task.index}">Analyzing...</span></div>`;
            try {
                await runRemediation(task);
            } catch (err) {
                task.container.innerHTML = `<p style="color:var(--error); font-size:0.75rem;">Failed: ${err.message}</p><button class="primary" onclick="addToQueue(${task.index}, '${task.base64}', ${task.pageIdx}, '${task.imgName}')">Retry</button>`;
            }
            isProcessingQueue = false;
            setTimeout(processQueue, 500);
        }

        async function runRemediation(task, retryCount = 0) {
            const apiKey = apiKeyInput.value.trim();
            const prompt = `Task: Generate accessibility alt text and technical logic for this image. HARD CONSTRAINT: The 'alt' value MUST NOT exceed 125 characters. LOGIC CONSTRAINT: The 'explanation' value must be no more than two sentences. Format: JSON ONLY {"alt": "...", "explanation": "..."}`;

            let modelToUse = authorizedModels.find(m => m.name.includes('gemini-2.0-flash'))?.name || 
                             authorizedModels.find(m => m.name.includes('flash'))?.name || 'models/gemini-1.5-flash';

            const finalModelPath = modelToUse.startsWith('models/') ? modelToUse : `models/${modelToUse}`;
            const version = (finalModelPath.includes('gemini-2') || finalModelPath.includes('gemini-3')) ? 'v1' : 'v1beta';
            const url = `https://generativelanguage.googleapis.com/${version}/${finalModelPath}:generateContent?key=${apiKey}`;

            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ parts: [{ text: prompt }, { inline_data: { mime_type: "image/jpeg", data: task.base64 } }] }] })
            });

            if (!response.ok) {
                const errorData = await response.json();
                if (response.status === 429 && retryCount < 4) {
                    const waitTime = Math.pow(2, retryCount) * 5000;
                    document.getElementById(`polly-feedback-${task.index}`).innerText = `Rate Limit: Cooling down (${waitTime/1000}s)...`;
                    await new Promise(r => setTimeout(r, waitTime));
                    return runRemediation(task, retryCount + 1);
                }
                throw new Error(errorData.error?.message || "Communication Error");
            }

            const result = await response.json();
            const data = JSON.parse(result.candidates[0].content.parts[0].text.replace(/```json/g, '').replace(/```/g, '').trim());
            
            // SAVE DATA WITH PDF METADATA
            remediationResults[task.index] = {
                alt: data.alt,
                pageIdx: task.pageIdx,
                imgName: task.imgName
            };
            
            remediatedCount++;
            task.badge.className = "badge badge-remediated";
            task.badge.innerText = "Remediated";
            task.container.innerHTML = `
                <div class="alt-result">${data.alt}</div>
                <div class="char-counter ${data.alt.length > 125 ? 'over-limit' : ''}">${data.alt.length} / 125 characters</div>
                <div class="explanation"><strong>Technical Logic:</strong> ${data.explanation}</div>
            `;
            updateDownloadButton();
        }

        function updateDownloadButton() {
            readySub.innerText = `${remediatedCount} assets remediated.`;
            downloadBtn.disabled = remediatedCount === 0;
        }

        /**
         * PHASE 2: THE WRITER
         * Injects the structure tree and alternate text.
         */
        async function handleDownload() {
            statusRight.innerText = "Injecting Tags...";
            try {
                if (!currentPdfBytes) throw new Error("No PDF data in memory.");
                const pdfDoc = await PDFDocument.load(currentPdfBytes);
                const context = pdfDoc.context;
                
                // 1. MarkInfo: Tell readers the PDF is marked (tagged)
                const markInfo = context.obj({ Marked: true });
                pdfDoc.catalog.set(PDFName.of('MarkInfo'), markInfo);

                // 2. Setup StructTreeRoot (The main world of logical tags)
                const structTreeRoot = context.obj({
                    Type: 'StructTreeRoot',
                    ClassMap: context.obj({}),
                    RoleMap: context.obj({ Figure: 'Figure' }),
                    K: context.obj([]) // Children of the root
                });
                pdfDoc.catalog.set(PDFName.of('StructTreeRoot'), structTreeRoot);

                // 3. Process every remediated image
                const remediationArray = Object.values(remediationResults);
                
                for (const item of remediationArray) {
                    const page = pdfDoc.getPage(item.pageIdx);
                    
                    // Create a Structure Element for this Figure
                    const structElem = context.obj({
                        Type: 'StructElem',
                        S: 'Figure',
                        P: structTreeRoot, // Parent is the root
                        Alt: PDFString.of(item.alt),
                        Pg: page.ref // Point back to the page it lives on
                    });

                    // Add this element to the StructTreeRoot's children list
                    structTreeRoot.get(PDFName.of('K')).push(structElem);

                    // Note: In Phase 3, we will add the MCID wrapping of the content stream.
                    // For now, this establishes the "Logical World" entry for the figure.
                    console.log(`[Polly Writer] Injected StructElem for ${item.imgName} on Page ${item.pageIdx + 1}`);
                }

                const pdfBytes = await pdfDoc.save();
                const blob = new Blob([pdfBytes], { type: 'application/pdf' });
                const link = document.createElement('a');
                link.href = URL.createObjectURL(blob);
                link.download = currentFileName;
                link.click();
                
                statusRight.innerText = "Tags Injected & Saved";
            } catch (err) {
                console.error("Writer Analysis Failed", err);
                statusRight.innerText = "Injection Error";
            }
        }
    </script>
</body>
</html>
